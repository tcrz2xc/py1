name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  python-lint:
    name: Python — flake8
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python + flake8
        run: |
          pacman -Syu --noconfirm python python-pip
          pip install flake8 --break-system-packages

      - name: Lint /ai and /python (own code only)
        run: |
          flake8 ai/ python/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv \
            --per-file-ignores="
              *_test.py:ALL
              *_test_data.py:ALL
              ai/clue.py:F403,F405
              ai/harry.py:F403,F405
            " \
            --statistics \
            --count

  # ── Python tests ───────────────────────────────────────────────────────────
  python-tests:
    name: Python — pytest (Exercism track)
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python + pytest
        run: |
          pacman -Syu --noconfirm python python-pip
          pip install pytest termcolor --break-system-packages

      - name: Run Exercism test suites
        run: |
          pytest python/ \
            -p no:cacheprovider \
            -W ignore::pytest.PytestUnknownMarkWarning \
            --ignore=python/ellens-alien-game \
            -v --tb=short

      - name: Run AI smoke test
        run: |
          python -c "
          import sys; sys.path.insert(0, 'ai')
          from logic import Symbol, And, Or, Not, model_check
          s = Symbol('test')
          kb = And(s)
          assert model_check(kb, s), 'model_check failed'
          print('logic.py OK')
          "

  # ── Bash — ShellCheck ─────────────────────────────────────────────────────
  shellcheck:
    name: Bash — ShellCheck
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: pacman -Syu --noconfirm shellcheck

      - name: Lint bash/ (Exercism track — strict)
        run: |
          find bash/ -name "*.sh" \
            | xargs shellcheck --severity=warning --shell=bash

      - name: Lint bash_scripts/done/ (curriculum — warning only, skip demos)
        # Some scripts in done/ are intentionally broken for teaching purposes
        # (04-trap-info, 02-undefined, parameter-expansion, process-substitution).
        # We lint the production-intent scripts only.
        run: |
          EXCLUDE=(
            "04-trap-info"
            "02-undefined"
            "parameter-expansion"
            "process-substitution"
            "00-simple"
            "01-syntax-error"
          )

          mapfile -t scripts < <(find bash_scripts/done/ -type f \
            ! -name "*.csv" \
            ! -name "*.txt" \
            ! -name "*.md" \
            ! -name "*.png" \
            ! -name "*.jpg" \
            ! -name "complex.csv" \
            ! -name "simple.csv" \
            ! -name "file.txt")

          filtered=()
          for f in "${scripts[@]}"; do
            skip=false
            for ex in "${EXCLUDE[@]}"; do
              [[ "$f" == *"$ex"* ]] && skip=true && break
            done
            [[ "$skip" == false ]] && filtered+=("$f")
          done

          if [[ ${#filtered[@]} -gt 0 ]]; then
            shellcheck --severity=warning --shell=bash "${filtered[@]}"
          else
            echo "No scripts to lint."
          fi
